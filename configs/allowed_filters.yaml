filters:
  # --- Numeric filters (from comprehension rules / LLM inference) ---
  - field: price
    operators: [lt, lte, gt, gte, eq]
    type: number
    multiplier: 100
    description: "Recipe price in cents (keyword). User says euros/dollars, multiply by 100."
    examples: ["under 5", "less than 10"]
    word_values:
      cheap: 800
      budget: 500

  - field: preparation_time
    operators: [lt, lte, gt, gte, eq]
    type: number
    multiplier: 60
    description: "Preparation time in seconds (keyword). User says minutes, multiply by 60."
    examples: ["under 30 minutes", "quick"]
    word_values:
      quick: 1800
      fast: 1200

  - field: total_calories
    operators: [lt, lte, gt, gte, eq]
    type: number
    description: "Calories per serving (keyword, e.g. '560 kcal'). Painless strips suffix."
    examples: ["under 500 calories", "low calorie"]
    word_values:
      low calorie: 400

  # --- Keyword filters (matching actual product index fields) ---
  - field: categories
    operators: [eq, in]
    type: keyword
    description: "Recipe category (e.g. Poultry, Pork, Beef, Seafood, Soup, Salad)."
    examples: ["soup", "salad", "dessert", "breakfast"]

  - field: recipe_cuisine
    operators: [eq, in]
    type: keyword
    description: "Cuisine or regional food style."
    examples: ["italian", "mexican", "asian", "mediterranean"]

  - field: ingredients
    operators: [eq, in]
    type: keyword
    description: "Key ingredient in the recipe."
    examples: ["chicken", "salmon", "tofu", "pasta"]

  - field: tags
    operators: [eq, in]
    type: keyword
    description: "Recipe tags including dietary labels, meal types, and cooking methods."
    examples: ["vegan", "gluten-free", "vegetarian", "high protein", "quick", "grilled", "one pan"]

  - field: allergens
    operators: [eq, in]
    type: keyword
    description: "Allergens present in the recipe."
    examples: ["milk", "eggs", "wheat", "soy", "tree nuts"]

  - field: difficulty_level
    operators: [eq, in]
    type: number
    description: "How hard the recipe is (1=easy, 2=medium, 3=hard)."
    examples: ["easy", "medium", "hard"]
    word_values:
      easy: 1
      medium: 2
      hard: 3
