filters:
  # --- Numeric filters (from comprehension rules / LLM inference) ---
  - field: price
    operators: [lt, lte, gt, gte, eq]
    type: number
    description: "Recipe price in cents."
    examples: ["under 5", "less than 10"]
    word_values:
      cheap: 800
      budget: 500

  - field: preparation_time
    operators: [lt, lte, gt, gte, eq]
    type: number
    description: "Preparation time in seconds."
    examples: ["under 30 minutes", "quick"]
    word_values:
      quick: 1800
      fast: 1200
      super quick: 1200

  - field: total_calories
    operators: [lt, lte, gt, gte, eq]
    type: number
    description: "Total calories per serving (index stores as 'NNN kcal' string)."
    examples: ["under 500 calories", "low calorie"]
    word_values:
      low calorie: 400

  - field: servings
    operators: [eq]
    type: number
    description: "Number of servings."
    examples: ["for 4 people", "serves 2"]

  # --- Keyword filters (from concept index fields) ---
  - field: dietary
    operators: [eq, in]
    type: keyword
    description: "Dietary labels like vegan, gluten-free, etc."
    examples: ["vegan", "gluten-free", "vegetarian", "dairy-free"]

  - field: cuisine
    operators: [eq, in]
    type: keyword
    description: "Cuisine or regional food style."
    examples: ["italian", "mexican", "asian", "mediterranean"]

  - field: ingredient
    operators: [eq, in]
    type: keyword
    description: "Key ingredient in the recipe."
    examples: ["chicken", "salmon", "tofu", "pasta"]

  - field: category
    operators: [eq, in]
    type: keyword
    description: "Recipe category or course type."
    examples: ["soup", "salad", "dessert", "breakfast"]

  - field: meal_type
    operators: [eq, in]
    type: keyword
    description: "Meal occasion or time of day."
    examples: ["dinner", "lunch", "snack", "brunch"]

  - field: cooking_method
    operators: [eq, in]
    type: keyword
    description: "How the dish is prepared."
    examples: ["grilled", "baked", "fried", "slow-cooked"]

  - field: tags
    operators: [eq, in]
    type: keyword
    description: "Product tags (dietary, cooking method, lifestyle)."
    examples: ["High Protein", "Low Carb", "One Pan", "Kid Friendly", "Ready to Heat"]

  - field: difficulty_level
    operators: [eq, in]
    type: number
    description: "How hard the recipe is (1=easy, 2=medium, 3=hard)."
    examples: ["easy", "medium", "hard"]
    word_values:
      easy: 1
      medium: 2
      hard: 3

  - field: availability
    operators: [eq, in]
    type: keyword
    description: "Product availability / sold-out status."
    examples: ["in stock", "sold out"]
