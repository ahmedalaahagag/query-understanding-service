# Comprehension rules per language.
# Each rule extracts a filter or sort from natural language patterns.
#
# Filter rules:
#   - Numeric: pattern must capture the number in group 2. E.g. (under)\s+(\d+)
#   - Keyword: set "value" for a static extraction. E.g. "easy recipes" -> difficulty_level eq "easy"
#
# Sort rules:
#   - Pattern match triggers a sort directive. First match wins.
#
# IMPORTANT: More specific numeric rules (prep_time, calories) must come BEFORE
# the generic price rule. Rule ordering + overlap detection prevents double-match.
#
# Field names must match the actual product index fields:
#   preparation_time (keyword, seconds), total_calories (keyword, e.g. "560 kcal"),
#   price (keyword, cents), difficulty_level (keyword, "1"/"2"/"3"),
#   tags (keyword array), recipe_label (keyword)

en:
  filter_rules:
    # --- Prep time (before price — more specific) ---
    # Index field: preparation_time (keyword, seconds). Multiplier 60 converts minutes->seconds.
    - pattern: '(under|less than)\s+(\d+)\s*(minutes?|mins?)'
      field: preparation_time
      operator: lt
      multiplier: 60
    - pattern: '()\b(\d+)\s*(?:minutes?|mins?)\s+(?:or less|max)'
      field: preparation_time
      operator: lte
      multiplier: 60
    - pattern: '()\b(\d+)\s*(?:minutes?|mins?)\b'
      field: preparation_time
      operator: lte
      multiplier: 60
    - pattern: '\b(super\s*quick|superquick)\b'
      field: preparation_time
      operator: lte
      value: "1200"
    - pattern: '\b(quick|fast)\b'
      field: preparation_time
      operator: lte
      value: "1800"

    # --- Calories (before price — more specific) ---
    # Index field: total_calories (keyword, e.g. "560 kcal"). Painless strips suffix.
    - pattern: '(under|less than)\s+(\d+)\s*cal(ories?|s)?'
      field: total_calories
      operator: lt
    - pattern: '()\b(\d+)\s*(?:calories?|cals?|kcal)\b'
      field: total_calories
      operator: lte

    # --- Price (generic — must come after time/calorie rules) ---
    # Index field: price (keyword, cents). Multiplier 100 converts user euros/dollars->cents.
    # Note: Go regexp (RE2) does not support lookahead. Rule ordering handles
    # disambiguation: prep_time and calorie rules above consume their regions
    # first, so the generic price rules below only match leftovers.
    - pattern: '(under|less than|cheaper than)\s+(\d+(?:\.\d+)?)'
      field: price
      operator: lt
      multiplier: 100
    - pattern: '(over|more than)\s+(\d+(?:\.\d+)?)'
      field: price
      operator: gt
      multiplier: 100

    # --- Dietary / Nutritional tags ---
    # Index field: tags (keyword array).
    - pattern: '\b(low carb|low-carb)\b'
      field: tags
      operator: eq
      value: "Low Carb"
    - pattern: '\b(high protein|high-protein)\b'
      field: tags
      operator: eq
      value: "High Protein"
    - pattern: '\b(low sodium|low-sodium)\b'
      field: tags
      operator: eq
      value: "Low Sodium"
    - pattern: '\b(carb smart)\b'
      field: tags
      operator: eq
      value: "Carb Smart"
    - pattern: '\b(sodium smart)\b'
      field: tags
      operator: eq
      value: "Sodium Smart"
    - pattern: '\b(low calories?|low cal|light)\b'
      field: total_calories
      operator: lte
      value: "650"
      strip: true
    - pattern: '\b(calorie smart|cal smart)\b'
      field: tags
      operator: eq
      value: "Calorie Smart"
      strip: true
    - pattern: '\b(carb conscious)\b'
      field: tags
      operator: eq
      value: "Carb Conscious"
    - pattern: '\b(gluten[\s-]*free|no gluten|gf|celiac)\b'
      field: tags
      operator: eq
      value: "Gluten-Free Friendly"
      strip: true
    - pattern: '\b(dairy[\s-]*free|no dairy|lactose[\s-]*free|without dairy)\b'
      field: tags
      operator: eq
      value: "Dairy-free"
      strip: true
    - pattern: '\b(no pork|pork[\s-]*free|without pork)\b'
      field: tags
      operator: eq
      value: "Pork-free"
      strip: true
    - pattern: '\b(not spicy|no spicy|no spice|non[\s-]*spicy)\b'
      field: tags
      operator: eq
      value: "Non-spicy"
      strip: true
    - pattern: '\b(vegan|plant[\s-]*based)\b'
      field: tags
      operator: eq
      value: "Vegan"
      strip: true
    - pattern: '\b(vegetarian|meat[\s-]*free|no meat)\b'
      field: tags
      operator: eq
      value: "Vegetarian"
      strip: true
    - pattern: '\b(pescatarian|peskatarian)\b'
      field: tags
      operator: eq
      value: "pescatarian"
      strip: true
    - pattern: '\b(keto|ketogenic)\b'
      field: tags
      operator: eq
      value: "Keto"
      strip: true
    - pattern: '\b(under 650 calories|under 650 cal|under 650 kcal|650 calories or less)\b'
      field: tags
      operator: eq
      value: "Under 650 Calories"
      strip: true
    - pattern: '\b(glp[\s-]*1\s*balance)\b'
      field: tags
      operator: eq
      value: "GLP-1 Balance"
      strip: true
    - pattern: '\b(glp[\s-]*1\s*friendly)\b'
      field: tags
      operator: eq
      value: "GLP-1 Friendly"
      strip: true
    - pattern: '\b(dietitian[\s-]*approved)\b'
      field: tags
      operator: eq
      value: "Dietitian-Approved"
      strip: true
    - pattern: '\b(mediterranean\s*diet)\b'
      field: tags
      operator: eq
      value: "Mediterranean"
    - pattern: '\b(mediterranean)\b'
      field: tags
      operator: eq
      value: "Mediterranean"
    - pattern: '\b(fiber smart|fibre smart)\b'
      field: tags
      operator: eq
      value: "Fiber Smart"
      strip: true
    - pattern: '\b(fiber powered|fibre powered)\b'
      field: tags
      operator: eq
      value: "Fiber Powered"
      strip: true
    - pattern: '\b(fiber filled|fibre filled)\b'
      field: tags
      operator: eq
      value: "Fiber Filled"
      strip: true
    - pattern: '\b(high fiber|high fibre)\b'
      field: tags
      operator: eq
      value: "Fiber Smart"
      strip: true

    # --- Product types / Recipe labels ---
    - pattern: '\b(ready\s*made(?:\s*meals?)?|ready\s*to\s*(?:heat|eat)|heat\s*and\s*eat|oven\s*ready|pre\s*-?\s*made|premade)\b'
      field: tags
      operator: eq
      value: "Ready to Heat"
    - pattern: '\b(prep\s*(?:and|&)\s*bake)\b'
      field: tags
      operator: eq
      value: "Oven Ready"
    - pattern: '\b(best\s*seller)\b'
      field: tags
      operator: eq
      value: "Bestseller"

    # --- Lifestyle / audience tags ---
    - pattern: '\b(kid\s*friendly|kids?\s*meal)\b'
      field: tags
      operator: eq
      value: "Kid Friendly"
    - pattern: '\b(family\s*friendly)\b'
      field: tags
      operator: eq
      value: "Family Friendly"
    - pattern: '\b(big\s*batch)\b'
      field: tags
      operator: eq
      value: "Big Batch"

    # --- Cooking method / equipment ---
    - pattern: '\b(one\s*-?\s*pan)\b'
      field: tags
      operator: eq
      value: "One Pan"
    - pattern: '\b(one\s*-?\s*pot)\b'
      field: tags
      operator: eq
      value: "One Pot"
    - pattern: '\b(sheet\s*pan)\b'
      field: tags
      operator: eq
      value: "Sheet Pan"
    - pattern: '\b(air\s*fryer)\b'
      field: tags
      operator: eq
      value: "Air Fryer"

    # --- Difficulty ---
    # Index field: difficulty_level (keyword, "1"=easy, "2"=medium, "3"=hard).
    - pattern: '\b(easy|simple|beginner)\b'
      field: difficulty_level
      operator: eq
      value: "1"
    - pattern: '\b(medium|intermediate|moderate)\b'
      field: difficulty_level
      operator: eq
      value: "2"
    - pattern: '\b(hard|difficult|advanced|challenging)\b'
      field: difficulty_level
      operator: eq
      value: "3"

    # --- Servings ---
    - pattern: '(for|serves?|feeds?)\s+(\d+)\s*(people|persons?|servings?)?'
      field: servings
      operator: eq

  sort_rules:
    - pattern: '\b(cheapest|lowest price)\b'
      field: price
      direction: asc
    - pattern: '\b(most expensive|priciest)\b'
      field: price
      direction: desc
    - pattern: '\b(newest|most recent|latest)\b'
      field: updated_at
      direction: desc
    - pattern: '\b(fastest|quickest)\b'
      field: preparation_time
      direction: asc
    - pattern: '\b(most popular|top rated|best rated|highest rated)\b'
      field: rating
      direction: desc
    - pattern: '\b(lowest calorie|fewest calories)\b'
      field: total_calories
      direction: asc
