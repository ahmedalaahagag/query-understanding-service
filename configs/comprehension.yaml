    - pattern: '\b(airfryer|varmluftfriture)\b'
      field: tags
      operator: eq
      value: "Air Fryer"
    - pattern: '\b(stor portion|stor batch)\b'
      field: tags
      operator: eq
      value: "Big Batch"
    - pattern: '\b(fiber smart)\b'
      field: tags
      operator: eq
      value: "Fiber Smart"
      strip: true
    - pattern: '\b(fiber power)\b'
      field: tags
      operator: eq
      value: "Fiber Powered"
      strip: true
    - pattern: '\b(fiberrig|rig på fiber)\b'
      field: tags
      operator: eq
      value: "Fiber Filled"
      strip: true

    # --- Product types ---
    - pattern: '\b(færdigret|klar til at spise|klar til opvarmning|forlavet)\b'
      field: tags
      operator: eq
      value: "Ready to Heat"
    - pattern: '\b(forbered og bag)\b'
      field: tags
      operator: eq
      value: "Oven Ready"
    - pattern: '\b(bedst sælgende|best seller)\b'
      field: tags
      operator: eq
      value: "Bestseller"

    # --- Difficulty ---
    - pattern: '\b(nem|simpel)\b'
      field: difficulty_level
      operator: eq
      value: "1"
    - pattern: '\b(mellem|middel)\b'
      field: difficulty_level
      operator: eq
      value: "2"
    - pattern: '\b(svær|vanskelig|avanceret)\b'
      field: difficulty_level
      operator: eq
      value: "3"

    # --- Servings ---
    - pattern: '(til)\s+(\d+)\s*(personer|portioner)?'
      field: servings
      operator: eq

  sort_rules:
    - pattern: '\b(billigste)\b'
      field: price
      direction: asc
    - pattern: '\b(nyeste|seneste)\b'
      field: updated_at
      direction: desc
    - pattern: '\b(hurtigste)\b'
      field: preparation_time
      direction: asc
    - pattern: '\b(mest populære|bedst bedømt)\b'
      field: rating
      direction: desc
